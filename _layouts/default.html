<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site.title }}</title>
    
    <!-- Link to custom CSS file -->
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

    <!-- MathJax Configuration for beautiful math rendering -->
    <script>
      MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']],
          displayMath: [['$$', '$$'],['\\[', '\\]']],
          processEscapes: true 
        }
      };
    </script>
    <script type="text/javascript" id="MathJax-script" async
      src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js">
    </script>
</head>
<body>
    <!-- The header section that will appear on all pages -->
    <header>
        <h1><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
        
        <!-- Navigation Menu -->
        <nav style="margin-top: 10px;">
            <a href="{{ '/' | relative_url }}" style="margin-right: 15px;">Home</a>
            <a href="{{ '/about.html' | relative_url }}">About</a>
        </nav>
    </header>

    <!-- Footer section -->
    <footer>
        <p>&copy; 2026 {{ site.title }}. All rights reserved.</p>
    </footer>
</body>
</html>
